[plugin]
name = "scene_understanding"
version = "1.0.0"
type = "image_text_understanding"
description = "Scene understanding using local Qwen VLM"

[runtime]
command = "uv run python -m scene_understanding_plugin.main"
# uv run 首次启动需要解析依赖/创建虚拟环境，可能较慢
idle_timeout = 600
startup_timeout = 120

[capabilities]
actions = ["describe_scene", "describe_scenes_batch"]
max_batch_size = 1

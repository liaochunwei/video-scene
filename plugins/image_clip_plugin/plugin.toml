[plugin]
name = "image_clip"
version = "1.0.0"
type = "image_text_vectorization"
description = "Image-text vectorization using CLIP"

[runtime]
command = "uv run python -m image_clip_plugin.main"
# uv run 首次启动需要解析依赖/创建虚拟环境，可能较慢
idle_timeout = 180
startup_timeout = 120

[capabilities]
actions = ["encode_image", "encode_images_batch"]
max_batch_size = 16

[plugin]
name = "insightface"
version = "1.0.0"
type = "face"
description = "Face detection and recognition using InsightFace"

[runtime]
command = "uv run python -m insightface_plugin.main"
# uv run 首次启动需要解析依赖/创建虚拟环境，可能较慢
idle_timeout = 300
startup_timeout = 120

[capabilities]
actions = ["detect", "detect_batch", "encode"]
max_batch_size = 16
